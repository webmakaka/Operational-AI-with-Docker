# frontend-deployment.yaml — React frontend Deployment + Service.
#
# The frontend is a static React app served by nginx on port 3000.
# It calls the go-backend Service at http://go-backend:8080 for chat requests.
#
# Access externally via port-forward:
#   kubectl port-forward svc/react-frontend 3000:3000 -n ai-app
#   open http://localhost:3000
#
# Apply: kubectl apply -f frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  namespace: ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-frontend
  template:
    metadata:
      labels:
        app: react-frontend
    spec:
      containers:
        - name: react-frontend
          image: react-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_BACKEND_URL
              value: "http://go-backend:8080"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: react-frontend
  namespace: ai-app
spec:
  selector:
    app: react-frontend
  ports:
    - port: 3000
      targetPort: 3000
