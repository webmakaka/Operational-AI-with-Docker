# dmr-deployment.yaml — Docker Model Runner Deployment + Service.
#
# IMPORTANT: The containerised DMR listens on port 12434 (not 8080).
#
# On Docker Desktop kind clusters, the Go backend calls the HOST DMR at
# http://host.docker.internal:12434 rather than this in-cluster Service.
# See backend-deployment.yaml for details.
#
# Readiness probe uses /v1/models — returns 200 only when a model is loaded.
# Liveness probe uses /health — returns 200 when the HTTP server is running.
# initialDelaySeconds: 60/120 — model containers need time to load before probes fire.
#
# Apply: kubectl apply -f dmr-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-model-runner
  namespace: ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-model-runner
  template:
    metadata:
      labels:
        app: docker-model-runner
    spec:
      initContainers:
      - name: changeowner
        image: busybox
        command: ["sh", "-c", "chmod a+rwx /models"]
        volumeMounts:
        - name: model-files
          mountPath: /models
      containers:
        - name: model-runner
          image: docker/model-runner:latest
          env:
          - name: DMR_ORIGINS
            value: "http://localhost:31245,http://localhost:12434"
          ports:
            - containerPort: 12434
          envFrom:
            - configMapRef:
                name: dmr-config
          volumeMounts:
            - name: model-files
              mountPath: /models
          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 12434
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 12434
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
        - name: model-init
          image: curlimages/curl:8.14.1
          envFrom:
            - configMapRef:
                name: dmr-config
          command: ["/bin/sh", "-c"]
          args:
          - |
            set -ex
            MODEL_RUNNER=http://localhost:12434
            echo "Pre-pulling models..."
            if [ -n "$MODEL_NAME" ]; then
              echo "Pulling model: $MODEL_NAME"
              curl -d "{\"from\": \"$MODEL_NAME\"}" "$MODEL_RUNNER"/models/create
            fi
            echo "Model pre-pull complete"
            tail -f /dev/null
          volumeMounts:
          - name: model-files
            mountPath: /models
      volumes:
        - name: model-files
          persistentVolumeClaim:
            claimName: model-storage
---
apiVersion: v1
kind: Service
metadata:
  name: docker-model-runner
  namespace: ai-app
spec:
  selector:
    app: docker-model-runner
  ports:
    - port: 12434
      targetPort: 12434
